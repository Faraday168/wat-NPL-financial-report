<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ผู้ดูแลรายงานการเงินวัด</title><link rel="stylesheet" href="../assets/css/style.css?v=20260620fix2"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet"></head><body><main class="wrap section"><h1>ระบบผู้ดูแลรายงานการเงินวัด</h1><p>แก้แล้วหน้าเว็บจะเปลี่ยนทันที กรณีไม่เปลี่ยนให้กด Ctrl+F5</p><div id="status" class="status">พร้อมใช้งาน</div><section id="loginBox" class="card"><h2>เข้าสู่ระบบ</h2><div class="grid"><div><label>Email</label><input id="email" autocomplete="username"></div><div><label>Password</label><input id="password" type="password" autocomplete="current-password"></div></div><br><button class="btn" id="loginBtn">เข้าสู่ระบบ</button></section><section id="adminBox" style="display:none"><div class="button-row"><a class="btn outline" href="../" target="_blank">เปิดหน้าเว็บ</a><button class="btn danger" id="logoutBtn">ออกจากระบบ</button></div><div class="notice">ช่องตัวเลขใส่ comma ได้ เช่น 124,500 หรือ 1,000,000</div><div class="card"><h2>ข้อมูลวัด</h2><div class="grid"><div><label>ชื่อวัด</label><input id="templeName"></div><div><label>โทรศัพท์</label><input id="phone"></div><div><label>ลิงก์เพจ Facebook</label><input id="facebookUrl"></div><div><label>URL รูปเจ้าอาวาส</label><input id="abbotImage"></div></div><img id="abbotImagePreview" class="preview"><label>ที่อยู่</label><textarea id="address"></textarea><label>แคปชั่นธรรมะใต้รูปเจ้าอาวาส</label><textarea id="abbotCaption"></textarea><button class="btn action" id="saveSettings">บันทึกข้อมูลวัด</button></div><div class="card"><h2>ยอดเงินปัจจุบัน</h2><div class="grid"><div><label>ชื่อบัญชีที่ 1</label><input id="bank1Name"></div><div><label>ยอดบัญชีที่ 1</label><input id="bank1Amount" inputmode="decimal"></div><div><label>ชื่อบัญชีที่ 2</label><input id="bank2Name"></div><div><label>ยอดบัญชีที่ 2</label><input id="bank2Amount" inputmode="decimal"></div><div><label>เงินสด</label><input id="cashAmount" inputmode="decimal"></div><div><label>วัน เดือน ปี ที่อัปเดต</label><input id="balanceUpdatedAtText" placeholder="20 มิถุนายน 2569"></div></div><br><button class="btn action" id="saveBalances">บันทึกยอดเงิน</button></div><div class="card"><h2>ปุ่ม Donate / QR Code</h2><div class="grid"><div><label>URL รูป QR Code</label><input id="qrImage"></div><div><label>ชื่อบัญชี</label><input id="accountName"></div><div><label>เลขบัญชี</label><input id="accountNumber"></div><div><label>ธนาคาร</label><input id="bankName"></div></div><img id="qrImagePreview" class="preview"><label>ข้อความใต้ปุ่ม Donate</label><textarea id="note"></textarea><button class="btn action" id="saveDonate">บันทึกข้อมูลบริจาค</button></div><div id="projectForm" class="card"><h2>โครงการของวัด</h2><input id="projectId" type="hidden"><p id="projectMode">โหมด: เพิ่มโครงการใหม่</p><div class="grid"><div><label>ชื่อโครงการ</label><input id="title"></div><div><label>สถานะ</label><input id="status" placeholder="กำลังดำเนินการ"></div><div><label>งบประมาณทั้งหมด</label><input id="budget" inputmode="decimal"></div><div><label>ใช้เงินไปแล้ว</label><input id="spent" inputmode="decimal"></div><div><label>เปอร์เซ็นต์แก้เอง</label><input id="percentOverride" inputmode="decimal" placeholder="ว่างไว้ = คำนวณอัตโนมัติ"></div><div><label>วัน เดือน ปี ที่อัปเดต</label><input id="projectUpdatedAtText"></div><div><label>URL รูปที่ 1</label><input id="image1"></div><div><label>URL รูปที่ 2</label><input id="image2"></div></div><img id="image1Preview" class="preview"><img id="image2Preview" class="preview"><label>รายละเอียดโครงการ</label><textarea id="description"></textarea><div class="tools"><button class="btn action" id="saveProject">บันทึกโครงการ</button><button class="btn soft" id="clearProject">ล้างฟอร์ม</button><button class="btn outline action" id="seedProjects">สร้างโครงการตัวอย่าง 3 โครงการ</button></div></div><h2>รายการโครงการทั้งหมด</h2><div id="projectList" class="admin-list"></div></section></main><script type="module" src="admin.js?v=20260620fix2"></script></body></html>
